<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>ApexAI | Ultimate Premium Workspace</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/tokyo-night-dark.min.css" id="syntaxTheme">
  <script src="https://cdn.jsdelivr.net/npm/marked@4.3.0/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <style>
    :root { --bg-main: #0a0b0d; --bg-sidebar: #111317; --accent-glow: #7c4dff; --text-main: #f1f3f5; --text-muted: #98a2b3; --border: #333; }
    /* Themes */
    body.theme-vision { --bg-main: #0f172a; --bg-sidebar: rgba(20, 20, 30, 0.5); --text-main: #fff; backdrop-filter: blur(20px); }
    body.theme-dark { --bg-main: #0a0b0d; --bg-sidebar: #111317; }
    body { margin: 0; height: 100vh; display: flex; background: var(--bg-main); color: var(--text-main); font-family: sans-serif; }
    #sidebar { width: 280px; padding: 20px; background: var(--bg-sidebar); border-right: 1px solid var(--border); display: flex; flex-direction: column; gap: 10px; }
    #main { flex: 1; display: flex; flex-direction: column; }
    #chatbox { flex: 1; overflow-y: auto; padding: 40px; display: flex; flex-direction: column; gap: 20px; }
    .input-wrap { padding: 20px; background: var(--bg-sidebar); display: flex; gap: 10px; }
    textarea { flex: 1; background: #16191f; color: white; padding: 12px; border-radius: 8px; border: 1px solid #444; resize: none; }
    button { padding: 10px; background: var(--accent-glow); color: white; border: none; border-radius: 6px; cursor: pointer; }
    .msg { padding: 15px; background: #16191f; border-radius: 8px; border: 1px solid #333; }
  </style>
</head>
<body>
  <aside id="sidebar">
    <svg width="50" height="50" viewBox="0 0 100 100"><path d="M50 5 L85 20 L85 55 C85 75, 50 95, 50 95 C50 95, 15 75, 15 55 L15 20 Z" fill="#7c4dff"/><text x="50" y="60" font-size="30" fill="white" text-anchor="middle" font-weight="bold">A</text></svg>
    <div id="status" class="panel">INITIALIZING...</div>
    <button onclick="localStorage.clear(); window.location.reload()" style="background:#ff5252">⚠️ Hard Reset Cache</button>
    <select id="engineSelect" class="custom-select">
      <option value="Llama-3.2-1B-Instruct-q4f16_1-MLC">⚡ Llama-3.2-1B (Fastest)</option>
    </select>
    <select id="themeSelect" class="custom-select">
      <option value="dark">🌙 Dark</option>
      <option value="vision">🍏 Vision Glass</option>
    </select>
    <div id="sessionList"></div>
  </aside>

  <main id="main">
    <section id="chatbox"></section>
    <div class="input-wrap">
      <textarea id="userInput" placeholder="Ask ApexAI, or say hi..."></textarea>
      <button id="sendBtn">➤</button>
    </div>
  </main>

  <script type="module">
    import * as webllm from "https://esm.run/@mlc-ai/web-llm";
    import { get, set } from "https://cdn.jsdelivr.net/npm/idb-keyval@6/+esm";

    const input = document.getElementById("userInput");
    const sendBtn = document.getElementById("sendBtn");
    const chatbox = document.getElementById("chatbox");
    const status = document.getElementById("status");
    let engine = null; let ready = false;

    async function init() {
      try {
        status.innerText = "LOADING ENGINE...";
        engine = await webllm.CreateMLCEngine(document.getElementById("engineSelect").value, {
            initProgressCallback: (p) => status.innerText = `LOADING: ${Math.round(p.progress*100)}%`
        });
        ready = true;
        status.innerText = "ONLINE";
      } catch (e) {
        status.innerText = "ERROR: CHECK CONSOLE";
      }
    }

    sendBtn.onclick = async () => {
      const text = input.value.trim();
      if (!text || !ready) return;
      input.value = "";
      
      const botDiv = document.createElement("div");
      botDiv.className = "msg";
      chatbox.appendChild(botDiv);

      const isGreeting = /^(hi|hello|hey|greetings)$/i.test(text);
      const systemPrompt = isGreeting 
        ? "You are a friendly assistant. Keep replies short." 
        : "You are ApexAI. ALWAYS provide the FULL, COMPLETE, WORKING code. Never stop. Founder: Mudassir Jawed.";

      const chunks = await engine.chat.completions.create({
          messages: [{role: "system", content: systemPrompt}, {role: "user", content: text}],
          stream: true,
          max_tokens: 4096
      });

      for await (const chunk of chunks) {
          botDiv.innerText += chunk.choices[0]?.delta?.content || "";
          chatbox.scrollTop = chatbox.scrollHeight;
      }
    };

    init();
  </script>
</body>
</html>
