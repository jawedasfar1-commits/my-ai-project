<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>AbyssAI | Deep Sea Intelligence</title>
  <meta name="description" content="AbyssAI is a deep-sea themed AI chat assistant for math, coding, and school help." />

  <style>
    :root {
      --deep-sea: #000814;
      --midnight: #001d3d;
      --water-glow: #00f2ff;
      --kelp: #24d39b;
      --text: #e0f7fa;
      --muted: rgba(224, 247, 250, 0.7);
      --panel: rgba(0, 8, 20, 0.9);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      height: 100vh;
      overflow: hidden;
      display: flex;
      color: var(--text);
      font-family: "Segoe UI", system-ui, sans-serif;
      background:
        radial-gradient(circle at 75% 15%, rgba(0, 242, 255, 0.18), transparent 28%),
        radial-gradient(circle at 20% 80%, rgba(36, 211, 155, 0.12), transparent 28%),
        linear-gradient(160deg, var(--midnight), var(--deep-sea));
      touch-action: manipulation;
    }

    .bubble {
      position: fixed;
      border-radius: 50%;
      pointer-events: none;
      background: rgba(255, 255, 255, 0.35);
      box-shadow: inset -3px -3px 10px rgba(255,255,255,0.45), 0 0 18px rgba(0,242,255,0.35);
      animation: floatUp 4s linear forwards;
      z-index: 10;
    }

    @keyframes floatUp {
      from {
        transform: translateY(0) scale(1);
        opacity: 1;
      }
      to {
        transform: translateY(-560px) scale(1.5);
        opacity: 0;
      }
    }

    #sidebar {
      width: 280px;
      min-width: 280px;
      padding: 22px;
      background: var(--panel);
      border-right: 1px solid rgba(0, 242, 255, 0.35);
      backdrop-filter: blur(20px);
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo {
      width: 44px;
      height: 44px;
      border-radius: 12px;
      display: grid;
      place-items: center;
      color: #00131e;
      font-weight: 900;
      background: linear-gradient(135deg, var(--water-glow), var(--kelp));
      box-shadow: 0 0 24px rgba(0, 242, 255, 0.45);
    }

    h1, h2, p {
      margin: 0;
    }

    h1 {
      font-size: 24px;
    }

    .muted {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
    }

    .panel {
      padding: 14px;
      border: 1px solid rgba(0, 242, 255, 0.22);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.05);
    }

    #status {
      color: var(--water-glow);
      font-size: 13px;
      margin-bottom: 10px;
    }

    .progress {
      height: 7px;
      overflow: hidden;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.1);
    }

    #progressBar {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, var(--water-glow), var(--kelp));
      transition: width 0.25s ease;
    }

    #clearBtn {
      margin-top: auto;
      padding: 11px;
      border-radius: 8px;
      border: 1px solid var(--water-glow);
      color: var(--water-glow);
      background: transparent;
      cursor: pointer;
    }

    #main {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
    }

    #chatbox {
      flex: 1;
      width: min(100%, 880px);
      margin: 0 auto;
      padding: 24px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 14px;
      scroll-behavior: smooth;
    }

    .welcome {
      margin: auto;
      max-width: 560px;
      text-align: center;
      display: grid;
      gap: 14px;
    }

    .welcome h2 {
      font-size: clamp(34px, 8vw, 64px);
      color: var(--water-glow);
    }

    .prompts {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      margin-top: 8px;
    }

    .prompt {
      min-height: 56px;
      padding: 12px;
      border: 1px solid rgba(0, 242, 255, 0.25);
      border-radius: 8px;
      color: var(--text);
      background: rgba(255, 255, 255, 0.06);
      cursor: pointer;
      text-align: left;
    }

    .prompt:hover {
      border-color: var(--water-glow);
      background: rgba(0, 242, 255, 0.1);
    }

    .msg {
      max-width: min(85%, 700px);
      width: fit-content;
      padding: 14px 17px;
      border-radius: 18px;
      border: 1px solid rgba(0, 242, 255, 0.2);
      background: rgba(255, 255, 255, 0.06);
      backdrop-filter: blur(12px);
      white-space: pre-wrap;
      overflow-wrap: anywhere;
      line-height: 1.5;
    }

    .user {
      align-self: flex-end;
      background: rgba(0, 242, 255, 0.15);
      border-color: var(--water-glow);
      border-bottom-right-radius: 6px;
    }

    .bot {
      align-self: flex-start;
      border-bottom-left-radius: 6px;
    }

    .error {
      border-color: #ff7a7a;
      background: rgba(255, 122, 122, 0.12);
    }

    #inputArea {
      padding: 18px 20px 22px;
      background: linear-gradient(transparent, rgba(0, 8, 20, 0.9));
    }

    .input-wrap {
      width: min(100%, 820px);
      min-height: 60px;
      margin: 0 auto;
      padding: 8px;
      border: 1px solid var(--water-glow);
      border-radius: 999px;
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(18px);
    }

    #userInput {
      flex: 1;
      min-width: 0;
      height: 42px;
      padding: 0 12px;
      border: 0;
      outline: 0;
      color: white;
      background: transparent;
      font-size: 16px;
    }

    #userInput::placeholder {
      color: rgba(224, 247, 250, 0.5);
    }

    #sendBtn {
      width: 46px;
      height: 46px;
      min-width: 46px;
      border: 0;
      border-radius: 50%;
      color: #00131e;
      font-size: 20px;
      cursor: pointer;
      background: linear-gradient(135deg, var(--water-glow), var(--kelp));
      box-shadow: 0 0 22px rgba(0, 242, 255, 0.55);
    }

    #sendBtn:disabled,
    #userInput:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }

    @media (max-width: 700px) {
      body {
        display: block;
      }

      #sidebar {
        display: none;
      }

      #main {
        height: 100vh;
      }

      #chatbox {
        padding: 18px 14px;
      }

      .prompts {
        grid-template-columns: 1fr;
      }

      .msg {
        max-width: 92%;
      }

      #inputArea {
        padding: 12px 10px 14px;
      }

      .input-wrap {
        border-radius: 26px;
      }
    }
  </style>
</head>

<body>
  <aside id="sidebar">
    <div class="brand">
      <div class="logo">A</div>
      <div>
        <h1>AbyssAI</h1>
        <p class="muted">Deep Sea Intelligence</p>
      </div>
    </div>

    <div class="panel">
      <div id="status">SUBMERGED</div>
      <div class="progress">
        <div id="progressBar"></div>
      </div>
      <p class="muted" id="statusDetail" style="margin-top:10px;">Preparing local AI engine.</p>
    </div>

    <div class="panel">
      <p class="muted">
        Runs in your browser with WebLLM. First load can take a while because the model downloads locally.
      </p>
    </div>

    <button id="clearBtn">Clear Chat</button>
  </aside>

  <main id="main">
    <section id="chatbox">
      <div class="welcome" id="welcome">
        <h2>AbyssAI</h2>
        <p class="muted">Ask a question, solve a problem, debug code, or get help studying.</p>

        <div class="prompts">
          <button class="prompt">Explain quadratic equations simply</button>
          <button class="prompt">Help me debug this JavaScript</button>
          <button class="prompt">Make a study plan for finals</button>
          <button class="prompt">Write a Python function for prime numbers</button>
        </div>
      </div>
    </section>

    <form id="inputArea">
      <div class="input-wrap">
        <input id="userInput" type="text" placeholder="Ask anything..." disabled />
        <button id="sendBtn" type="submit" disabled>➤</button>
      </div>
    </form>
  </main>

  <script type="module">
    import * as webllm from "https://esm.run/@mlc-ai/web-llm";

    const modelId = "Llama-3.2-1B-Instruct-q4f16_1-MLC";

    let engine = null;
    let ready = false;
    let generating = false;

    const chatbox = document.getElementById("chatbox");
    const welcome = document.getElementById("welcome");
    const form = document.getElementById("inputArea");
    const input = document.getElementById("userInput");
    const sendBtn = document.getElementById("sendBtn");
    const clearBtn = document.getElementById("clearBtn");
    const statusEl = document.getElementById("status");
    const statusDetail = document.getElementById("statusDetail");
    const progressBar = document.getElementById("progressBar");

    let messages = loadChat();

    renderStoredMessages();
    init();

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      sendMessage();
    });

    clearBtn.addEventListener("click", () => {
      localStorage.removeItem("abyssai-chat");
      messages = [];
      location.reload();
    });

    document.querySelectorAll(".prompt").forEach((button) => {
      button.addEventListener("click", () => {
        input.value = button.textContent.trim();
        input.focus();
      });
    });

    window.addEventListener("pointerdown", (event) => {
      if (event.target.closest("button, input")) return;
      spawnBubble(event.clientX, event.clientY);
    });

    async function init() {
      if (!("gpu" in navigator)) {
        setStatus("BROWSER NOT SUPPORTED", "WebGPU is required. Try Chrome or Edge.", 0);
        return;
      }

      try {
        setStatus("LOADING 0%", "Downloading and warming up the model.", 0);

        engine = await webllm.CreateMLCEngine(modelId, {
          initProgressCallback: (p) => {
            const percent = Math.round((p.progress || 0) * 100);
            setStatus(`LOADING ${percent}%`, p.text || "Preparing model.", percent);
          }
        });

        ready = true;
        setStatus("ONLINE", "Ready for your next question.", 100);
        input.disabled = false;
        sendBtn.disabled = false;
        input.focus();
      } catch (error) {
        console.error(error);
        setStatus("OFFLINE", "The model could not load in this browser.", 0);
        addMsg("AbyssAI could not start. WebLLM needs WebGPU support and enough memory.", "bot error");
      }
    }

    async function sendMessage() {
      const text = input.value.trim();

      if (!text || !ready || generating) return;

      generating = true;
      input.value = "";
      input.disabled = true;
      sendBtn.disabled = true;

      addMsg(text, "user");
      messages.push({ role: "user", content: text });
      saveChat();

      const botDiv = addMsg("Scanning the current...", "bot");

      const chatMessages = [
        {
          role: "system",
          content: "You are AbyssAI, a wise and helpful deep-sea themed assistant. Give clear, correct help with school, math, coding, and general questions."
        },
        ...messages.slice(-12)
      ];

      try {
        let reply = "";

        const chunks = await engine.chat.completions.create({
          messages: chatMessages,
          stream: true,
          temperature: 0.7
        });

        for await (const chunk of chunks) {
          reply += chunk.choices[0]?.delta?.content || "";
          botDiv.textContent = reply || "Thinking...";
          scrollBottom();
        }

        const finalReply = reply.trim() || "I finished thinking, but no answer came through.";
        botDiv.textContent = finalReply;

        messages.push({ role: "assistant", content: finalReply });
        saveChat();
      } catch (error) {
        console.error(error);
        botDiv.classList.add("error");
        botDiv.textContent = "Something went wrong while generating. Try again.";
      } finally {
        generating = false;
        input.disabled = false;
        sendBtn.disabled = false;
        input.focus();
        scrollBottom();
      }
    }

    function addMsg(text, cls) {
      welcome?.remove();

      const div = document.createElement("div");
      div.className = `msg ${cls}`;
      div.textContent = text;

      chatbox.appendChild(div);
      scrollBottom();

      return div;
    }

    function renderStoredMessages() {
      if (!messages.length) return;

      welcome?.remove();

      for (const message of messages) {
        addMsg(message.content, message.role === "user" ? "user" : "bot");
      }
    }

    function loadChat() {
      try {
        return JSON.parse(localStorage.getItem("abyssai-chat") || "[]");
      } catch {
        return [];
      }
    }

    function saveChat() {
      localStorage.setItem("abyssai-chat", JSON.stringify(messages.slice(-40)));
    }

    function setStatus(label, detail, percent) {
      statusEl.textContent = label;
      statusDetail.textContent = detail;
      progressBar.style.width = `${percent}%`;
    }

    function scrollBottom() {
      chatbox.scrollTop = chatbox.scrollHeight;
    }

    function spawnBubble(x, y) {
      const bubble = document.createElement("div");
      const size = Math.random() * 22 + 10;

      bubble.className = "bubble";
      bubble.style.width = `${size}px`;
      bubble.style.height = `${size}px`;
      bubble.style.left = `${x - size / 2}px`;
      bubble.style.top = `${y - size / 2}px`;

      document.body.appendChild(bubble);

      setTimeout(() => bubble.remove(), 4000);
    }
  </script>
</body>
</html>
